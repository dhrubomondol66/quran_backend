services:
  - type: web
    name: quran-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATABASE_URL
        fromDatabase:
          name: quran-db
          property: connectionString
      - key: SECRET_KEY
        value: ${SECRET_KEY}  # Reference to environment variable
      - key: GOOGLE_CLIENT_ID
        value: ${GOOGLE_CLIENT_ID}
      - key: APPLE_CLIENT_ID
        value: ${APPLE_CLIENT_ID}
      - key: APPLE_TEAM_ID
        value: ${APPLE_TEAM_ID}
      - key: STRIPE_SECRET_KEY
        value: ${STRIPE_SECRET_KEY}  # Use the environment variable
      - key: STRIPE_PUBLISHABLE_KEY
        value: ${STRIPE_PUBLISHABLE_KEY}  # Use the environment variable
      - key: STRIPE_WEBHOOK_SECRET
        value: ${STRIPE_WEBHOOK_SECRET}  # Use the environment variable
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ${SMTP_USER}  # Use the environment variable
      - key: SMTP_PASSWORD
        value: ${SMTP_PASSWORD}  # Use the environment variable
      - key: SMTP_FROM_EMAIL
        value: ${SMTP_FROM_EMAIL}
      - key: SMTP_FROM_NAME
        value: Quran App
      - key: FRONTEND_URL
        value: https://quran-api.onrender.com/auth
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}  # Use the environment variable
      - key: ADMIN_SECRET_KEY
        value: my-super-secret-key-12345

databases:
  - name: quran-db
    databaseName: quran_app
    user: postgres
    plan: free
